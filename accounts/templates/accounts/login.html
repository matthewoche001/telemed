{% extends 'base.html' %}
{% block title %}Sign In - OHMS{% endblock %}

{% block auth_content %}
<div class="auth-card">
    <div class="auth-header">
        <div class="auth-logo">OHMS</div>
        <div class="auth-title">Sign in to your account</div>
    </div>

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label" for="id_username">Username</label>
            <input type="text" name="username" id="id_username" class="form-input" required autocomplete="username">
        </div>
        <div class="form-group">
            <label class="form-label" for="id_password">Password</label>
            <input type="password" name="password" id="id_password" class="form-input" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
    </form>

    <div class="auth-footer">
        Don't have an account? <a href="{% url 'accounts:register' %}">Register as Patient</a>
    </div>
</div>
{% endblock %}
