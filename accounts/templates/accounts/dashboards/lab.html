{% extends 'base.html' %}
{% block title %}Lab Dashboard{% endblock %}
{% block page_title %}Laboratory{% endblock %}

{% block content %}
<div class="page-title-block">
    <h1 class="page-title">Welcome, {{ user.get_full_name|default:user.username }}</h1>
    <p class="page-subtitle">Laboratory management</p>
</div>

<div class="stats-grid">
    <a href="{% url 'diagnostics:upload_scan' %}" class="stat-card" style="text-decoration: none;">
        <div class="stat-label">Upload CT Scan</div>
        <div class="stat-value">Submit</div>
    </a>
    <a href="{% url 'diagnostics:scan_list' %}" class="stat-card" style="text-decoration: none;">
        <div class="stat-label">Recent Scans</div>
        <div class="stat-value">View All</div>
    </a>
</div>
{% endblock %}
